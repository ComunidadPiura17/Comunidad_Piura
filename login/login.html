<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingresar — Comunidad Piurana</title>
  <link rel="stylesheet" href="login.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="auth-wrapper">

    <!-- Panel izquierdo decorativo -->
    <div class="auth-panel">
      <a href="../index.html" class="auth-panel__logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="17" stroke="white" stroke-width="1.5"/>
          <text x="18" y="23" text-anchor="middle" fill="white" font-size="13" font-family="Playfair Display" font-weight="700">CP</text>
        </svg>
        <span>Comunidad <strong>Piurana</strong></span>
      </a>
      <div class="auth-panel__content">
        <p class="auth-panel__eyebrow">Club Social & Deportivo</p>
        <h2 class="auth-panel__title">Bienvenido<br/>de vuelta.</h2>
        <p class="auth-panel__sub">Accede a tu comunidad, revisa eventos, cumpleaños y más.</p>
      </div>
      <div class="auth-panel__bg-text">CP</div>
    </div>

    <!-- Formulario de login -->
    <div class="auth-form-container">
      <div class="auth-form-box">
        <h1 class="auth-form__title">Iniciar Sesión</h1>
        <p class="auth-form__sub">¿No tienes cuenta? <a href="../registro/registro.html">Regístrate aquí</a></p>

        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tucorreo@ejemplo.com" autocomplete="email"/>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-password">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
            <button class="toggle-pass" id="togglePass" type="button" aria-label="Mostrar contraseña">👁</button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"/> Recordarme
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button class="btn-submit" id="btnLogin">
          <span id="btnText">Ingresar</span>
          <span id="btnLoader" class="loader" style="display:none;"></span>
        </button>

        <div class="divider"><span>o</span></div>

        <button class="btn-google" id="btnGoogle">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.8l6-6C34.5 3 29.5 1 24 1 14.7 1 6.8 6.5 3.2 14.4l7 5.4C12 14.1 17.5 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.4 5.5-4.9 7.2l7.5 5.8C43.6 37.3 46.5 31.3 46.5 24.5z"/>
            <path fill="#FBBC05" d="M10.2 28.2c-.6-1.7-.9-3.5-.9-5.2s.3-3.5.9-5.2l-7-5.4C1.2 15.1 0 19.4 0 24s1.2 8.9 3.2 11.6l7-5.4z"/>
            <path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.4-4.9l-7.5-5.8c-1.9 1.3-4.4 2.1-5.9 2.1-6.5 0-12-4.6-13.8-10.8l-7 5.4C6.8 41.5 14.7 47 24 47z"/>
          </svg>
          Continuar con Google
        </button>
      </div>
    </div>

  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
